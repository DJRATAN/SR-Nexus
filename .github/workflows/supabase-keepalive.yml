name: Supabase Keep Alive

on:
  schedule:
    # Runs at 00:00 every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: "https://rrzbldrqalwxbmbnytyp.supabase.co"
          SUPABASE_KEY: "sb_publishable_WBdfDETSqy8i5BXCv23AEQ_vBZstfxd"
        run: |
          curl -s -X GET "${SUPABASE_URL}/rest/v1/emails?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"
          echo "Supabase database pinged to prevent 7-day pause."
